    <script>
      // Prevent frontend libraries from crashing if they attempt to polyfill or overwrite fetch
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function() { /* Silently ignore reassignments */ },
          configurable: true
        });
      } catch (e) {}
    </script>
